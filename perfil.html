<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Comercio - Encuéntralo PZO</title>
    <link rel="icon" type="image/png" href="EN LOGO.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; background-color: #f4f6f9; color: #333;
        }
        #contenedor-perfil {
            max-width: 550px; margin: 30px auto; box-sizing: border-box;
        }
        .galeria-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: #ffffff; padding: 12px; border-radius: 12px;
            border: 1px solid #eef2f5; margin-bottom: 20px;
        }
        .galeria-item {
            position: relative; aspect-ratio: 1 / 1; background-color: #eaeaea;
            border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .galeria-img {
            width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s;
        }
        .galeria-item:hover .galeria-img { transform: scale(1.05); }

        .modal-visor {
            display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-contenido { max-width: 90%; max-height: 80vh; border-radius: 8px; object-fit: contain; }
        .modal-cerrar { position: absolute; top: 20px; right: 25px; color: white; font-size: 35px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="contenedor-perfil">
        <p style="text-align: center; color: #666; margin-top: 40px;">⏳ Cargando comercio oficial...</p>
    </div>

    <div id="mi-visor-modal" class="modal-visor" onclick="cerrarVistaGrande()">
        <span class="modal-cerrar" onclick="cerrarVistaGrande()">&times;</span>
        <img class="modal-contenido" id="img-modal-grande" src="" alt="Vista ampliada">
    </div>

    <script src="perfil.js"></script>
</body>
</html>
